// ── State ────────────────────────────────────────────────────────────
let screen = 'intro'; // intro | quiz | gate | results
let currentQ = 0;     // 0–15
let answers = {};     // questionIndex -> answerIndex
let persona = null;   // chris | alex | uma | fiona
let blocker = null;   // Q16 answer text
let score = 0;        // 0–100 normalized
let tier = 0;         // 1 | 2 | 3

// ── Score calculation ────────────────────────────────────────────────
function calcScore() {
  let raw = 0;
  for (let i = 1; i <= 14; i++) {
    if (answers[i] !== undefined && QUESTIONS[i].scored) {
      raw += QUESTIONS[i].answers[answers[i]].points;
    }
  }
  return Math.round(raw / MAX_RAW_SCORE * 100);
}

function getTier(s) {
  if (s <= 40) return 1;
  if (s <= 70) return 2;
  return 3;
}

// ── Render helpers ───────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k.startsWith('on')) e[k] = v;
    else e.setAttribute(k, v);
  });
  children.forEach(c => {
    if (c === null || c === undefined) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}

function getApp() { return document.getElementById('app'); }

function showScreen(html) {
  const app = getApp();
  app.innerHTML = '';

  // Update sticky nav step label
  const totalScored = QUESTIONS.length; // 16
  const showProgress = screen === 'quiz';
  const navLabel = document.getElementById('nav-step-label');
  if (navLabel) {
    navLabel.textContent = showProgress
      ? `Question ${currentQ + 1} of ${QUESTIONS.length}`
      : 'PM Readiness Scorecard';
  }

  if (showProgress) {
    const pct = Math.round((currentQ) / QUESTIONS.length * 100);
    const pw = el('div', { class: 'pc-progress-wrap' },
      el('div', { class: 'pc-progress-bar' },
        el('div', { class: 'pc-progress-fill', style: `width:${pct}%` })
      )
    );
    app.appendChild(pw);
  }

  const card = el('div', { class: 'pc-card pc-screen' });
  card.innerHTML = html;
  app.appendChild(card);

  const footer = el('div', { class: 'pc-footer' },
    '© 2026 ProductCharles.com'
  );
  app.appendChild(footer);

  requestAnimationFrame(() => card.classList.add('visible'));
}

// ── Screens ──────────────────────────────────────────────────────────
function renderIntro() {
  screen = 'intro';
  showScreen(`
    <div class="pc-intro">
      <div class="pc-intro-badge">Free Assessment</div>
      <h1>What Kind of Product Manager Are You Built to Become?</h1>
      <p>16 questions. 3 minutes. Instant personalized results — with a clear next step based on exactly where you are.</p>
      <ul class="pc-meta-list">
        <li>Identifies your PM persona and readiness level</li>
        <li>Scores you across 4 key PM skill categories</li>
        <li>Gives you a personalized action plan</li>
      </ul>
      <button class="pc-btn primary" onclick="startQuiz()" style="font-size:17px;padding:16px 40px;">
        Start the Assessment →
      </button>
    </div>
  `);
}

function renderQuestion() {
  screen = 'quiz';
  const q = QUESTIONS[currentQ];
  const isFirst = currentQ === 0;
  const selectedIdx = answers[currentQ];

  const answersHtml = q.answers.map((a, i) =>
    `<button class="pc-answer${selectedIdx === i ? ' selected' : ''}" onclick="selectAnswer(${i})">
      ${a.text}
    </button>`
  ).join('');

  const isLast = currentQ === QUESTIONS.length - 1;
  const hasAnswer = selectedIdx !== undefined;

  showScreen(`
    ${q.category ? `<p class="pc-category">${q.category}</p>` : ''}
    <p class="pc-question">${q.text}</p>
    <div class="pc-answers">
      ${answersHtml}
    </div>
    <div class="pc-nav-btns">
      ${isFirst
        ? '<span></span>'
        : '<button class="pc-btn-back" onclick="prevQuestion()">← Back</button>'
      }
      <button class="pc-btn${hasAnswer ? '' : ''}" id="pc-next-btn"
        onclick="${isLast ? 'goToGate()' : 'nextQuestion()'}"
        ${hasAnswer ? '' : 'disabled'}>
        ${isLast ? 'See My Results →' : 'Next →'}
      </button>
    </div>
  `);
}

function renderGate() {
  screen = 'gate';
  showScreen(`
    <div class="pc-gate">
      <h2>Your results are ready.</h2>
      <p>Enter your name and email to see your personalized PM readiness score and recommended next step.</p>
      <div class="pc-field">
        <label for="pc-name">First Name</label>
        <input type="text" id="pc-name" placeholder="Your first name" autocomplete="given-name">
      </div>
      <div class="pc-field">
        <label for="pc-email">Email Address</label>
        <input type="email" id="pc-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="pc-btn primary" id="pc-submit-btn" onclick="submitLead()"
        style="width:100%;font-size:17px;padding:16px;margin-top:8px;">
        Show My Results →
      </button>
      <p class="pc-privacy">No spam. Your results are sent to your inbox too.</p>
    </div>
  `);
}

function renderResults() {
  screen = 'results';
  const r = RESULTS[persona][tier];
  const bodyLines = r.body.split('\n\n').map(p => `<p class="pc-results-body">${p}</p>`).join('');

  showScreen(`
    <div class="pc-results-score">
      <div class="pc-score-circle">
        <span class="pc-score-number">${score}</span>
        <span class="pc-score-label">/ 100</span>
      </div>
      <div class="pc-score-info">
        <div class="pc-score-tier">${r.tier_label}</div>
        <div class="pc-score-headline">${r.headline}</div>
      </div>
    </div>
    ${bodyLines}
    <p class="pc-results-next">Your next step</p>
    <p style="font-size:15px;color:rgba(10,31,61,0.6);margin:0 0 20px;line-height:1.6;">${r.next}</p>
    <a href="${r.cta_url}" class="pc-results-cta" target="_blank" rel="noopener">
      ${r.cta_text}
    </a>
    <hr class="pc-divider">
    <p class="pc-results-secondary">
      Want to go deeper? Follow Charles on
      <a href="https://www.linkedin.com/in/charlesdu/" target="_blank" rel="noopener">LinkedIn</a>
      for daily PM insights from NASA, Apple, and Ticketmaster.
    </p>
  `);
}

// ── Actions ──────────────────────────────────────────────────────────
function startQuiz() {
  if (typeof fbq !== 'undefined') fbq('track', 'ViewContent', { content_name: 'PM Scorecard' });
  currentQ = 0;
  renderQuestion();
}

function selectAnswer(idx) {
  answers[currentQ] = idx;

  // Store persona from Q1
  if (currentQ === 0) {
    persona = QUESTIONS[0].answers[idx].persona;
  }

  // Store blocker from Q16
  if (currentQ === 15) {
    blocker = QUESTIONS[15].answers[idx].text;
  }

  renderQuestion();
}

function nextQuestion() {
  if (answers[currentQ] === undefined) return;
  currentQ++;
  renderQuestion();
}

function prevQuestion() {
  if (currentQ === 0) return;
  currentQ--;
  renderQuestion();
}

function goToGate() {
  if (answers[currentQ] === undefined) return;
  score = calcScore();
  tier = getTier(score);
  renderGate();
}

function submitLead() {
  const nameEl = document.getElementById('pc-name');
  const emailEl = document.getElementById('pc-email');
  const name = nameEl ? nameEl.value.trim() : '';
  const email = emailEl ? emailEl.value.trim() : '';

  if (!name) { nameEl.focus(); return; }
  if (!email || !email.includes('@')) { emailEl.focus(); return; }

  const btn = document.getElementById('pc-submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }

  if (typeof fbq !== 'undefined') fbq('track', 'Lead', { content_name: 'PM Scorecard' });

  const payload = {
    first_name: name,
    email: email,
    persona: RESULTS[persona].persona_label,
    score: score,
    tier: RESULTS[persona][tier].tier_label,
    biggest_blocker: blocker || '',
  };

  // Submit to GHL
  if (GHL_WEBHOOK && GHL_WEBHOOK !== 'YOUR_GHL_WEBHOOK_URL_HERE') {
    fetch(GHL_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    }).catch(() => {}); // fail silently — still show results
  }

  renderResults();
}

// ── Boot ─────────────────────────────────────────────────────────────
renderIntro();
</script>
